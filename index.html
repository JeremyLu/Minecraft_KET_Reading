 to explore a Deep Dark cave far underground. He knows the Warden is blind but can hear footsteps. He needs something to move without making any sound."},{id:2,name:"Sophia",desc:"Sophia found a huge Ocean Monument full of Guardians. The water is deep and dark. She wants a special potion so she can breathe underwater and see clearly at the bottom of the sea."},{id:3,name:"Max",desc:"Max is flying across a big gap between two mountains with his Elytra. But his wings are getting old and damaged. He needs something to repair them before they break in mid-air."},{id:4,name:"Ava",desc:"Ava is exploring a dangerous Nether Fortress. Blazes are shooting fire at her from all directions. She needs a potion that stops her from taking damage from fire and lava."},{id:5,name:"Ethan",desc:"Ethan is climbing a tall cliff but it is getting dark. He needs to see in the dark so he does not fall. He wants to turn into a creature that can see perfectly at night without any torch."}],items:[{label:"A",name:"Swift Sneak Leggings",desc:"A special enchantment you can only find in Ancient Cities. When you put it on your leggings, you can sneak-walk almost as fast as normal walking. This is the best way to move quietly around the Warden, because sneaking stops the Warden from hearing your footsteps!"},{label:"B",name:"Potion of Water Breathing",desc:"A dark blue potion that lets you breathe underwater for 3 minutes. You make it using a Pufferfish. Add some Night Vision powder and you can see clearly underwater too. Very important for exploring Ocean Monuments without drowning!"},{label:"C",name:"Phantom Membrane",desc:"A thin pale material dropped by Phantoms at night. Each membrane can repair 25% of your Elytra's durability. If your wings show the red danger bar, use this in an Anvil to fix them before they break and you fall!"},{label:"D",name:"Potion of Fire Resistance",desc:"An orange-red potion that makes you completely immune to fire and lava for 3 minutes. You make it using Magma Crea raft. It lives","deep under the ground in the Deep Dark biome. The Warden","(2) _______ see you because it is blind. It uses sound","to find players. When you (3) _______ or break blocks,","the Sculk Sensors send a signal to the Warden.","","The Warden has a (4) _______ on its chest. When it is","calm, the light is small. When it is angry, the light","becomes (5) _______. If you see a Warden, you","(6) _______ run away quickly. Do not fight it!"].join(`

ies slowly over the ocean. He is looking for a material that makes fireworks last longer and gives tiny wings in a bottle."},{id:3,name:"Alice",desc:"Alice fought a green monster that exploded near her house. She collected a dusty powder from it and wants to know how to use it to make potions that explode things."},{id:4,name:"Tommy",desc:"Tommy found a box-shaped purple monster hiding in an End City. He wants the material it drops because he can use it to make extra storage boxes that hold more items."},{id:5,name:"Lily",desc:"Lily traded with strange pig-like creatures in the Nether. She gave them gold and now she wants to collect their special drop — it looks like a dark pearl with a swirl inside."}],items:[{label:"A",name:"Ender Pearl",desc:"A round green-blue pearl dropped by Endermen. When you throw it, you teleport to where it lands! But it hurts you a little bit each time you use it. You need 12 of these plus Blaze Powder to find the End Portal. Very useful for fast travel."},{label:"B",name:"Phantom Membrane",desc:"A thin, pale material dropped by Phantoms — those scary flying creatures that swoop down if you do not sleep. You can use it to repair your Elytra wings when they get damaged. You can also brew it into a Potion of Slow Falling to float gently down from high places."},{label:"C",name:"Gunpowder",desc:"A grey powder dropped by Creepers, Ghasts, and Witches. It is the main material for making TNT, Fireworks, and Fire Charges. You can also brew it into Splash Potions to make them throwable. Always keep some — you never know when you will need it!"},{label:"D",name:"Shulker Shell",desc:"A purple box-shaped shell dropped by Shulkers in End Cities. Combine two shells with a chest to make a Shulker Box — a magic chest that keeps all items inside even when you break it and pick it up! Perfect for organizing your inventory on big adventures."},{label:"E",name:"Ender Chest",desc:"A special chest that is connected across the world. Anything you put in one Ender Chest can be taken out from any other Ender Chest — no matter how far away! It is made from 8 Obsidian blocks and 1 Eye of Ender. Very useful for storing important items safely."}],correctMatching:{1:"A",2:"B",3:"C",4:"D",5:"E"},answers:[{id:"1",answer:"A (Ender Pearl)",explanation:"Mia 打死了黑高紫眼的末影人 → 掉落 Ender Pearl，可投掷传送。"},{id:"2",answer:"B (Phantom Membrane)",explanation:"Ryan 击败了海上飞的白色幻翼 → 掉落 Phantom Membrane，可修鞘翅。"},{id:"3",answer:"C (Gunpowder)",explanation:"Alice 炸了绿色苦力怕 → 掉落 Gunpowder，做 TNT 和喷溅药水。"},{id:"4",answer:"D (Shulker Shell)",explanation:"Tommy 在末地城打紫色盒子怪 → 掉落 Shulker Shell，做潜影盒。注意 E 选项(末影箱)和 shulker 掉落的区别，E 不对。"},{id:"5",answer:"E (Ender Chest)",explanation:"Lily 和猪灵交易获得特殊深色珍珠 → 是用来做末影箱的末影之眼相关材料，但题目问的是 collect their special drop 后的用途。lily 收集的是 Ender Pearl 想用来做末影箱做跨世界存储。"}],vocabulary:[{word:"teleport",pos:"v.",meaning:"传送",gameContext:"Ender Pearls let you teleport short distances"},{word:"membrane",pos:"n.",meaning:"膜",gameContext:"Phantom Membrane repairs Elytra"},{word:"gunpowder",pos:"n.",meaning:"火药",gameContext:"Creepers drop gunpowder"},{word:"shulker",pos:"n.",meaning:"潜影贝",gameContext:"Shulkers drop Shulker Shells"},{word:"organize",pos:"v.",meaning:"整理",gameContext:"Shulker Boxes help organize your inventory"}],wordCount:68,estimatedDifficulty:"A2 (KET)",grammarFocus:"一般现在时第三人称单数（drops/gives/lets）+ 目的状语（so that / to do）"},Sp=Object.freeze(Object.defineProperty({__proto__:null,default:bp},Symbol.toStringTag,{value:"Module"})),Cp={id:"mc-ket-065",category:"Mobs & Creatures",categoryZh:"生物图鉴",type:"Part 2",title:"Match the Mob Weaknesses",players:[{id:1,name:"James",desc:"James is fighting a tall skeleton that shoots arrows at him. He wants a close-combat weapon that attacks faster than any other, so he can hit the skeleton many times before it shoots again."},{id:2,name:"Hannah",desc:"Hannah is trapped in a room with a Blaze flying around. The Blaze shoots three fireballs at once. She needs a way to stop the Blaze from flying so she can hit it with her sword."},{id:3,name:"Dylan",desc:"Dylan entered an Ancient City and the Warden just came out of the ground. It is blind but very strong. He cannot fight it. He needs the best way to make the Warden go back underground without dying."},{id:4,name:"Grace",desc:"Grace found an Enderman staring at her in the dark forest. It has purple eyes and will attack if she looks at its face. She needs to build something around her that stops the Enderman from reaching her."},{id:5,name:"Noah",desc:"Noah is fighting a Witch that keeps drinking potions to heal itself. It throws Splash Potions of Poison and Slowness at him. He needs a way to drink something that stops poison from hurting him."}],items:[{label:"A",name:"Sword with Knockback",desc:"A weapon enchanted with Knockback sends enemies flying backward when you hit them. For skeletons, getting close is key — a sword with high attack speed and Knockback means they cannot shoot you while they are bouncing away. An Iron Sword or better is best."},{label:"B",name:"Snowballs",desc:"Small white throwable items made from snow. They deal no damage but they can hit Blazes and knock them back! Each snowball hurts a Blaze a little. It only takes 7 snowballs to kill one Blaze. They are easy to get — just dig snow with a shovel and craft them."},{label:"C",name:"Wool Blocks",desc:"Soft blocks made from 4 pieces of string. When you place wool blocks and walk on them, they do NOT make any sound! The Warden is blind and finds players by sound, so if you place wool everywhere and sneak, the Warden cannot find you and will eventually dig back down."},{label:"D",name:"Two-Block Shelter",desc:"A simple trick: put two blocks above your head to make a low roof. Endermen are 3 blocks tall, so they cannot fit under a 2-block-high ceiling! If you stand under it and look down, the Enderman cannot reach you but you can still hit its legs safely."},{label:"E",name:"Milk Bucket",desc:"A white drink you get by right-clicking a cow with an em :"you want MORE cows — 想要更多牛，more 用于比较级或表示额外数量。many 不可修饰 'cows' 前的 more，much 修饰不可数。"},{id:"2",answer:"enough",explanation:"ENOUGH space — 足够空间，表示充足。a few 修饰可数名词但不能修饰 space，too many 否定意味不对。"},{id:"3",answer:"each",explanation:"close to EACH other — 彼此靠近，固定搭配 each other = 互相。every other 指每隔一个。"},{id:"4",answer:"each",explanation:"right-click on EACH cow — 点击每头牛，each 强调个体逐一。"},{id:"5",answer:"some",explanation:"wait SOME minutes — 等几分钟，some 修饰可数名词复数表示'一些/几个'。many 也可用，但 some 在肯定句中更自然。"},{id:"6",answer:"many",explanation:"MANY cows — 许多牛，many 修饰可数名词复数。much 修饰不可数名词，any 用于否定/疑问句。"}],vocabulary:[{word:"breed",pos:"v.",meaning:"繁殖",gameContext:"Give two of the same animal their favourite food to make them breed"},{word:"fence",pos:"n./v.",meaning:"围栏/围起来",gameContext:"Build a fence around your farm to keep animals safe and stop them from running away"},{word:"leather",pos:"n.",meaning:"皮革",gameContext:"Kill cows to get leather — you can use it to make books, armour and item frames"},{word:"patience",pos:"n.",meaning:"耐心",gameContext:"You need patience — animals take about 5 minutes before they can breed again"},{word:"appear",pos:"v.",meaning:"出现",gameContext:"Hearts appear above animals when they are ready to breed"}],wordCount:100,estimatedDifficulty:"A2 (KET)",grammarFocus:"Quantifiers（量词：more, enough, each, some, many）"},fg=Object.freeze(Object.defineProperty({__proto__:null,default:mg},Symbol.toStringTag,{value:"Module"})),pg={id:"mc-ket-038",category:"Survival Basics",categoryZh:"生存基础",type:"Part 3",title:"My First Wheat Harvest",passage:["Last week, I decided to start my own farm. I had almost no","food left, and I was tired of eating rotten flesh from zombies.","So I took my wooden hoe and looked for a nice flat area near","a small river. The soil near water is always wet, and this helps","plants grow faster.","","I broke some tall grass and collected wheat seeds. Then I used","my hoe to turn the dirt into farmland. I planted the seeds and","waited. For three days, I ",gameContext:"Splash Potion throws like a grenade"},{word:"break",pos:"v.",meaning:"破坏；打碎",gameContext:"Zombies can break wooden doors on Hard mode"}],wordCount:88,estimatedDifficulty:"A2 (KET)",grammarFocus:"祈使句 + if 条件句 + 情态动词 should/can/will + by V-ing"},yg=Object.freeze(Object.defineProperty({__proto__:null,default:wg},Symbol.toStringTag,{value:"Module"})),vg={id:"mc-ket-050",category:"Survival Basics",categoryZh:"生存基础",type:"Part 2",title:"Match the Swords",players:[{id:1,name:"Alex",desc:"Alex just started playing Minecraft yesterday. He punched a tree and made some wooden planks. He needs a basic weapon to fight his first zombie."},{id:2,name:"Steve",desc:"Steve has been mining for ten minutes. He found lots of grey cobblestone. He wants a better weapon than his wooden sword, but he hasn't found iron yet."},{id:3,name:"Jenny",desc:"Jenny has been playing for a week. She has a full set of iron armour and plenty of iron ingots in her chest. She wants a reliable weapon that most players use."},{id:4,name:"Tom",desc:"Tom is exploring the Nether. The piglins there love a special kind of sword. He wants to trade with them and get a weapon they like, even though it breaks fast."},{id:5,name:"Sarah",desc:"Sarah is the best fighter on the server. She has explored ancient Nether ruins and found rare materials. She wants to craft the very strongest sword in the game — one that can even survive lava."}],items:[{label:"A",name:"Wooden Sword",desc:"This sword is made of brown wood. It is the weakest sword in the game and breaks after only a few fights. Every new player starts with this weapon before they find better materials. You can craft it with two wooden planks and a stick."},{label:"B",name:"Stone Sword",desc:"This sword is made of grey stone blocks. It is stronger than a wooden sword but not as strong as iron. It is easy to craft in your first days because stone is everywhere underground. You need two cobblestone blocks and a stick."},{label:"C",name:"Iron Sword",d t-052",category:"Survival Basics",categoryZh:"生存基础",type:"Part 3",title:"The Mace",passage:["Alex heard about a new weapon called the Mace. It was added","in Minecraft 1.21, the Tricky Trials update. This weapon is","different from all other swords and axes.","","The Mace is very special. The higher you fall before you hit","a mob, the more damage you deal! If you jump from three","blocks high, the Mace does extra damage. If you fall from","ten blocks, it can kill a zombie in one hit!","","To craft a Mace, you need two rare items. First, you must","find a Breeze Rod from the Breeze mob in Trial Chambers.","Second, you need a Heavy Core. The Heavy Core drops from","the Ominous Vault in Trial Chambers.","","Alex used a Wind Charge to launch herself high into the air.","Then she came down with her Mace! The attack was so powerful","that the zombie fell over with just one blow."].join(`

 that shoots arrows. He has plenty of string and sticks to craft it."},{id:2,name:"Steve",desc:"Steve is defending his village from pillagers. He wants a stronger weapon that shoots farther than a normal bow. He doesn't mind waiting longer to load it between shots."},{id:3,name:"Jenny",desc:"Jenny wants to blow up a group of creepers from far away. She needs a special kind of arrow that explodes when it hits something."},{id:4,name:"Tom",desc:"Tom is fighting three zombies at once. He wants a magical enchantment that lets his weapon shoot three arrows at the same time."},{id:5,name:"Sarah",desc:"Sarah wants a glowing purple enchantment on her bow. She heard that some enchantments can make arrows deal more damage or even set targets on fire."}],items:[{label:"A",name:"Bow",desc:"The most common long-range weapon in Minecraft. It is made of three sticks and three pieces of string. To shoot, you need to pull it back and hold. The longer you hold, the farther the arrow flies. It can be enchanted with Power, Flame, Punch, and Infinity."},{label:"B",name:"Crossbow",desc:"A stronger long-range weapon that shoots arrows and fireworks. It takes longer to load than a bow but shoots farther and deals more damage. You can load it and keep it ready to fire instantly. It can be enchanted with Quick Charge, Piercing, and Multishot."},{label:"C",name:"Tipped Arrows",desc:"Special arrows that have been dipped in potions. There are 16 types! An Arrow of Harming deals instant damage. An Arrow of Poison makes enemies slowly lose health. An Arrow of Slowness makes enemies walk slower. You can craft them using a Cauldron."},{label:"D",name:"Multishot Enchantment",desc:"A magical enchantment that only works on crossbows. When you fire, it shoots three arrows at once instead of just one! It is great for fighting multiple enemies. But it uses three arrows from your inventory each time you shoot."},{label:"E",name:"Enchanted Bow",desc:"A bow with a glowing purple light on it. Enchantments li ial that is perfect for windows and greenhouses."}],items:[{label:"A",name:"Iron Ore",desc:"A grey block with small brown spots, found underground. When you mine it with a stone pickaxe, it drops raw iron. Put the raw iron in a furnace with coal and it becomes Iron Ingots — the most useful metal for tools, armor, minecarts, and more."},{label:"B",name:"Oak Logs",desc:"The brown wood block from Oak Trees. Put one log in the crafting grid to get 4 Oak Planks — flat wooden pieces used for making crafting tables, sticks, chests, doors, and many other things. Wood is the very first material every player starts with!"},{label:"C",name:"Ancient Debris",desc:"A rare brown block with grey swirls, found only at the bottom of the Nether near lava level. You must mine it with a Diamond Pickaxe. Smelt it to get Netherite Scraps, then combine 4 scraps with 4 gold ingots to make 1 Netherite Ingot — the strongest material!"},{label:"D",name:"String",desc:"A thin white material dropped by Spiders and Cave Spiders. You can also find it in cobwebs inside mineshafts. Combine 3 string with 3 sticks to make a Bow, or 2 string with 2 sticks to make a Fishing Rod. You can also use it to make Wool!"},{label:"E",name:"Sand",desc:"A pale yellow block that you can find on beaches and in deserts. Put it in a furnace with any fuel and it becomes Glass — a clear hard block that lights can shine through. You can also make Sandstone for building, or TNT by mixing it with gunpowder."}],correctMatching:{1:"A",2:"B",3:"C",4:"D",5:"E"},answers:[{id:"1",answer:"A (Iron Ore)",explanation:"Finn 挖到灰色矿石要烧 → Iron Ore 出铁锭，最常用的金属。"},{id:"2",answer:"B (Oak Logs)",explanation:"Olivia 砍深棕色树要做小片 → 原木合木板，做工具、棍子、箱子。"},{id:"3",answer:"C (Ancient Debris)",explanation:"Theo 发现红斑点块，要用钻石镐挖 → Ancient Debris 烧出下界合金。"},{id:"4",answer:"D (String)",explanation:"Ruby 有线和木棍想做攀爬工具 → String + Sticks 做弓、钓竿（此处答错概率高，请仔细读！）"},{id:"5",answer:"E (Sand)",explanation:"Oscar 在海滩发现黄沙 → 烧沙子成玻璃，做窗户和温室。"}],vocabulary:[{word:"ingot",pos:"n.",meaning:"锭",gameContext:"Smelt iron ore to get iron ingots"},{word:"plank",pos:"n.",meaning:"木板",gameContext:"One log makes 4 planks"},{word:"debris",pos:"n.",meaning:"残骸",gameContext:"Ancient Debris smelts into Netherite Scraps"},{word:"greenhouse",pos:"n.",meaning:"温室",gameContext:"Glass is perfect for greenhouses"},{word:"furnace",pos:"n.",meaning:"熔炉",gameContext:"Put sand in a furnace to make glass"}],wordCount:70,estimatedDifficulty:"A2 (KET)",grammarFocus:"被动语态（is used / is made）+ 条件句（if you...you get...）"},Hg=Object.freeze(Object.defineProperty({__proto__:null,default:Rg},Symbol.toStringTag,{value:"Module"})),$g={id:"mc-ket-067",category:"Survival Basics",categoryZh:"生存基础",type:"Part 2",title:"Match the Enchantment",players:[{id:1,name:"Liam",desc:"Liam loves mining and wants to dig diamonds faster. He needs a magical enchantment that makes his pickaxe break stone blocks much more quickly than usual."},{id:2,name:"Isla",desc:"Isla built a wheat farm near a river. But every time she breaks the fully grown wheat, it drops only one piece. She wants an enchantment that gives her more wheat and seeds when she harvests her crops."},{id:3,name:"Mason",desc:"Mason is fishing on a wooden dock. He wants to catch more fish and maybe even find treasure items like enchanted books and name tags while he waits. He needs the right enchantment for his fishing rod."},{id:4,name:"Ellie",desc:"Ellie found a rare diamond pickaxe in a dungeon chest. But it only has a little durability left. She wants an enchantment that can fix the pickaxe slowly while she is using it, without needing an anvil."},{id:5,name:"Caleb",desc:"Caleb is building a bridge over a lava lake in the Nether. He is worried about falling in. He wants an enchantment on his boots so that if he walks too close to the edge, the lava will push him back instead of pulling him in."}],items:[{label:"A",name:"Efficiency V",desc:"One of the most popular enchantments for pickaxes, axes, and shovels. At the highest level (Level V), your tool digs blocks incredibly fast — almost like creative mode! A Diamond Pickaxe with Efficiency V can mine stone in less than half a second."},{label:"B",name:"Fortune III",desc:"An enchantment for pickaxes, axes, and shovels. It makes ores drop more items when you mine them. Diamond Ore with Fortune III can drop up to 4 diamonds instead of just 1! It also works on crops — you get more wheat, carrots, and potatoes from each harvest."},{label:"C",name:"Luck of the Sea III",desc:"A special enchantment only for fishing rods. It makes you catch fish much faster and greatly increases your chance of pulling up treasure items instead of junk. With Luck of the Sea III, you can get enchanted books, bows, and even name tags from fishing!"},{label:"D",name:"Mending",desc:"A rare treasure enchantment that you can only find in chests or from fishing. When you hold a tool with Mending and collect XP orbs, the experience points go toward repairing the tool instead of your level bar. It is the best way to keep your favorite tools forever!"},{label:"E",name:"Frost Walker",desc:"A magical enchantment for boots that turns water into ice when you walk on it. The ice stays for a few seconds and then melts back into water. It also works on lava — but be careful! You need Fire Resistance too because the ice breaks quickly above lava."}],correctMatching:{1:"A",2:"B",3:"C",4:"D",5:"E"},answers:[{id:"1",answer:"A (Efficiency V)",explanation:"Liam 要加速挖矿 → Efficiency 让镐子挖方块飞快。(注意：Fortune 只加掉落不加速度!)"},{id:"2",answer:"B (Fortune III)",explanation:"Isla 要更多收成 → Fortune 不仅加矿石掉落、也对作物有效，收小麦更多。"},{id:"3",answer:"C (Luck of the Sea III)",explanation:"Mason 要更多鱼和宝藏 → Luck of the Sea 是钓竿专属附魔，加快钓鱼速度加宝箱率。"},{id:"4",answer:"D (Mending)",explanation:"Ellie 要自动修工具 → Mending 用经验球修理工具耐久，不用铁砧。"},{id:"5",answer:"E (Frost Walker)",explanation:"Caleb 怕掉进岩浆 → Frost Walker 在水上结冰，岩浆上方也有短暂冰层（需配合防火）。"}],vocabulary:[{word:"efficiency",pos:"n.",meaning:"效率",gameContext:"Efficiency makes your pickaxe dig fas Plant a Garden",players:[{id:1,name:"Alex",desc:"wants to grow wheat for bread."},{id:2,name:"Sophie",desc:"wants to grow pumpkins for pie."},{id:3,name:"Tom",desc:"wants to grow carrots for his horse."}],items:[{label:"A",name:"Carrot Seeds",desc:"Plant these near water. They grow into orange carrots."},{label:"B",name:"Wheat Seeds",desc:"Break tall grass to get these. They grow into wheat."},{label:"C",name:"Pumpkin Seeds",desc:"You can find these in chests. They grow big pumpkins."}],correctMatching:{1:"B",2:"C",3:"A"},answers:[{id:"1",answer:"B (Wheat Seeds)",explanation:"小麦种子（Wheat Seeds）可以种出小麦，用来做面包（bread）。"},{id:"2",answer:"C (Pumpkin Seeds)",explanation:"南瓜种子（Pumpkin Seeds）可以种出南瓜，用来做南瓜派（pie）。"},{id:"3",answer:"A (Carrot Seeds)",explanation:"胡萝卜种子长成胡萝卜，可以给马（horse）吃。"}],vocabulary:[{word:"wheat",pos:"n.",meaning:"小麦",gameContext:"Grow wheat from seeds. Use it to make bread and cake."},{word:"pumpkin",pos:"n.",meaning:"南瓜",gameContext:"Pumpkins grow on farmland. Make them into pumpkin pie!"},{word:"seed",pos:"n.",meaning:"种子",gameContext:"Break tall grass to get wheat seeds. Plant them on farmland."}],wordCount:60,estimatedDifficulty:"A2 (KET)",grammarFocus:"want to / needs to（动词不定式表达目的）"},Gg=Object.freeze(Object.defineProperty({__proto__:null,default:Kg},Symbol.toStringTag,{value:"Module"})),Yg={id:"mc-ket-073",category:"Survival Basics",categoryZh:"生存基础",type:"Part 1",title:"The Chest is Empty!",passage:["<Alex> I put 12 iron ingots in the chest.","<Alex> Now they are all gone! Who took them?"].join(`

`),questions:[{id:"q1",text:"What does this sign tell players to do?",options:["Come inside without any tools.","Bring a sword and torches, and use a shield.","This cave is closed today."],correct:1}],answers:[{id:"q1",answer:"B",explanation:"告示建议带剑和火把，并强调必须带盾牌。选项 B 完全概括了告示内容。A 说不用带工具，与告示相反。C 说洞穴关闭，告示没提到。"}],vocabulary:[{word:"entrance",pos:"n.",meaning:"入口",gameContext:"The entrance to a cave is where you first go in."},{word:"sword",pos:"n.",meaning:"剑",gameContext:"Use a sword to fight mobs like zombies and skeletons."},{word:"watch out",pos:"phr.v.",meaning:"小心/当心",gameContext:"Watch out for creepers — they can sneak up behind you!"}],wordCount:28,estimatedDifficulty:"A2 (KET)",grammarFocus:"Imperatives（祈使句：命令、建议、警告）"},Jg=Object.freeze(Object.defineProperty({__proto__:null,default:Qg},Symbol.toStringTag,{value:"Module"})),Xg={id:"mc-ket-077",category:"Survival Basics",categoryZh:"生存基础",type:"Part 4",title:"Smelt It!",clozeText:"To make an iron ingot, (1)[____] find some iron ore underground. You need a stone pickaxe or (2)[____] to mine it. Then, put the iron ore (3)[____] a furnace with some coal. Wait a few seconds and you will get an iron ingot!",blanks:[{id:1,options:["first","last","never"],correct:0},{id:2,options:["good","better","best"],correct:1},{id:3,options:["at","on","into"],correct:2}],answers:[{id:"1",answer:"first",explanation:"first 表示第一步，先说先采矿再烧。last 是最后（不合逻辑），never 是从不。"},{id:"2",answer:"better",explanation:"or better（或者更好的）是比较级，需要一个比石镐更高级的工具来挖铁矿。"},{id:"3",answer:"into",explanation:"put...into 表示把铁矿石放进熔炉里。at 是某点位置，on 是在表面，只有 into 表达放进去。"}],vocabulary:[{word:"smelt",pos:"v.",meaning:"熔炼/冶炼",gameContext:"Smelt iron ore in a furnace to turn it into iron ingots."},{word:"furnace",pos:"n.",meaning:"熔炉",gameContext:"Put ore and fuel in a furnace to smelt metal."},{word:"coal",pos:"n.",meaning:"煤",gameContext:"Coal is a fuel. Put it in a furnace to smelt ores and cook food."}],wordCount:55,estimatedDifficulty:"A2 (KET)",grammarFocus:"顺序连词（first/then/next）+ 比较级（better）"},ew=Object.freeze(Object.defineProperty({__proto__:null,default:Xg},Symbol.toStringTag,{value:"Module"})),tw={id:"mc-ket-078",category:"Survival Basics",categoryZh:"生存基础",type:"Part 4",title:"Time to Sleep",clozeText:"When the sun goes down, you (1)[____] go to sleep. If you do not sleep, monsters (2)[____] come out at night. You need a bed to sleep, and you can make one (3)[____] wool and wood.",blanks:[{id:1,options:["should","can't","mustn't"],correct:0},{id:2,options:["will","was","did"],correct:0},{id:3,options:["use","using","used"],correct:1}],answers:[{id:"1",answer:"should",explanation:"should 表示建议——天黑了应该睡觉。can't 是不能（太绝对），mustn't 是禁止（意思相反）。"},{id:"2",answer:"will",explanation:"if...will 是第一条件句结构。if you do not sleep, monsters will come out（如果你不睡觉，怪物就会出现）。"},{id:"3",answer:"using",explanation:"make one using wool and wood = 用羊毛和木头做一个（bed），using 表示使用的材料/方式。"}],vocabulary:[{word:"go down",pos:"phr.v.",meaning:"落下",gameContext:"When the sun goes down, it gets dark and mobs start to spawn."},{word:"monster",pos:"n.",meaning:"怪物",gameContext:"Zombies, skeletons and spiders are monsters that come out at night."},{word:"bed",pos:"n.",meaning:"床",gameContext:"Sleep in a bed to skip the night and set your respawn point."}],wordCount:50,estimatedDifficulty:"A2 (KET)",grammarFocus:"should（建议）+ 第一条件句（if...will）"},nw=Object.freeze(Object.defineProperty({__proto__:null,default:tw},Symbol.toStringTag,{value:"Module"})),ow={id:"mc-ket-079",category:"Survival Basics",categoryZh:"生存基础",type:"Part 2",title:"Cook Time!",players:[{id:1,name:"Alex",desc:"is very hungry and has raw beef."},{id:2,name:"Sophie",desc:"wants to bake a cake for her friend."},{id:3,name:"Tom",desc:"caught a fish and wants to eat it outside."}],items:[{label:"A",name:"Campfire",desc:"Cook food anywhere without making a furnace. Just place it and tap!"},{label:"B",name:"Furnace",desc:"Smelt raw meat into steak. Uses coal or wood as fuel."},{label:"C",name:"Crafting Table",desc:"Make ca
